plugins {
    id 'com.android.application'
}

android {
    namespace 'com.bhumivivek.keybridge'
    compileSdk 34

    defaultConfig {
        applicationId 'com.bhumivivek.keybridge'
        minSdk 21
        targetSdk 33
        versionCode 2
        versionName '2.0'
    }

    buildTypes {
        debug {
            // debug build is auto-signed with the standard debug key — fine for sideloading
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
